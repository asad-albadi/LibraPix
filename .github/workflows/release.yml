name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: librapix-linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: librapix-windows.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            name: librapix-macos-intel

          - os: macos-latest
            target: aarch64-apple-darwin
            name: librapix-macos-apple-silicon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          BIN=target/${{ matrix.target }}/release/librapix
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN=$BIN.exe
          fi
          cp $BIN dist/${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*